name: Build WPF

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.1
    
    - name: Restore NuGet packages
      run: nuget restore CybersecurityChatbotWPF.sln
    
    - name: Build solution
      run: msbuild CybersecurityChatbotWPF.sln /p:Configuration=Release
